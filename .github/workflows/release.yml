name: Build and Release Windows x64 Installer

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.11.0

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Build
        run: zig build -Dtarget=x86_64-windows -Doptimize=ReleaseSafe

      - name: Package
        run: Compress-Archive -Path zig-out/bin/*.exe -DestinationPath build.zip

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: build.zip
